services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: personal-os-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && SECRET_KEY=build-only python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: personal-os-api-xk0z.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://personal-os-frontend.onrender.com
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TIME_ZONE
        value: Africa/Cairo

  # ── Cron: Morning Brief (05:20 Cairo = 03:20 UTC) ───────────────────────────
  - type: cron
    name: morning-brief
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "20 3 * * *"
    startCommand: python manage.py send_morning_brief
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: personal-os-api-xk0z.onrender.com,localhost,127.0.0.1
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TIME_ZONE
        value: Africa/Cairo
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  # ── Cron: Evening Summary (20:30 Cairo = 18:30 UTC) ─────────────────────────
  - type: cron
    name: evening-summary
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    schedule: "30 18 * * *"
    startCommand: python manage.py send_eod_summary
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: personal-os-api-xk0z.onrender.com,localhost,127.0.0.1
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TIME_ZONE
        value: Africa/Cairo
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  # ── React Frontend (Static Site) ────────────────────────────────────────────
  - type: web
    name: personal-os-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://personal-os-api-xk0z.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
